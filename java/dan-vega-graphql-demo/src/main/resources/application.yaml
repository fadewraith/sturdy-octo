spring:
  application:
    name: graphql-jbooks

  datasource:
    url: jdbc:postgresql://localhost:5432/jbooks
    username: postgres
    password: postgresql

  jpa:
    hibernate:
      ddl-auto: create-drop   # or create / validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
#  http://localhost:8080/graphiql?path=/graphql
  graphql:
    graphiql:
      enabled: true
  threads:
    virtual:
      enabled: true

management:
  tracing:
    sampling:
      probability: 1.0

